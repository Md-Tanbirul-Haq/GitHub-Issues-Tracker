<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>

<body class="bg-neutral-300/50 min-h-screen pt-10">
    <div class="w-[400px] mx-auto flex flex-col items-center  bg-white py-20 rounded-lg">

        <img src="images/4.png" alt="">
        <p class="mt-2 text-2xl font-bold">GitHub Issues Tracker</p>
        <p class="text-neutral-500/50">Sign in to manage your issues</p>

        <div>
            <fieldset class="fieldset  rounded-box w-xs  p-4">


                <label class="label font-bold">Username</label>
                <input type="text" class="input" placeholder="Enter Username" />
                <label class="label font-bold text-sky-500">Username : admin</label>

                <label class="label font-bold">Password</label>
                <input type="password" class="input " placeholder="Enter Password" />
                <label class="label font-bold text-sky-500">Password : 1234</label>

                <button class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>
    </div>

    <script src="project.js"></script>
</body>

</html>
