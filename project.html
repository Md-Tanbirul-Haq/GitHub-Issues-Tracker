<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-neutral-300/50 min-h-screen">

    <nav class="bg-white">
        <div class="navbar bg-base-100 shadow-sm px-10 flex flex-wrap justify-between gap-2">
            <div class=" flex items-center gap-1 ">

                <img class="w-8 h-8" src="images/4.png" alt="">
                <a class="text-xl font-bold">GitHub Issuse Tracker</a>

            </div>
            <div class="flex gap-2">
                <input id="search" type="text" placeholder="Search" class="input input-bordered  w-[200px]" />
                <button id="search-btn" onclick="search_()" class="btn btn-primary px-5 w-[100px]">Search</button>

            </div>
        </div>
    </nav>
    <section class="w-10/12 mx-auto">
        <div class="bg-white mt-10 mb-5 py-4 px-4 rounded-lg flex gap-2 flex-wrap">
            <button id="all_btn" onclick="all_issues()" class="btn btn-primary w-[100px]">All</button>
            <button id="open_btn" onclick="total_issues('open')" class="btn w-[100px]">Open</button>
            <button id="closed_btn" onclick="total_issues('closed')" class="btn w-[100px]">Closed</button>
        </div>

        <section class="bg-neutral-300/50 pb-5 rounded-lg">
            <div class="flex justify-between gap-5 px-4 py-4 bg-white rounded-t-lg mb-5">
                <div class="flex items-center gap-1">
                    <div><img src="images/2.png" alt=""></div>
                    <div>
                        <div> <span id="issues_number">50</span> Issues</div>
                        <div class="text-neutral-500/50">Track and manage your project issues</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="flex items-center gap-1">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <div>Open</div>
                    </div>
                    <div class="flex items-center gap-1">
                        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                        <div>Closed</div>
                    </div>
                </div>
            </div>

            <!-- Total issuses -->
            <div id="total" class=" px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">


            </div>

        </section>

    </section>

    <script src="project.js"></script>
</body>

</html>
