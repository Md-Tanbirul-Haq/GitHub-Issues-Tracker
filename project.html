<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-neutral-300/50 min-h-screen">

    <nav class="bg-white">
        <div class="navbar bg-base-100 shadow-sm px-10 flex flex-wrap justify-between gap-2">
            <div class=" flex items-center gap-1 ">

                <img class="w-8 h-8" src="images/4.png" alt="">
                <a class="text-xl font-bold">GitHub Issuse Tracker</a>

            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered  w-[200px]" />
                <button class="btn btn-primary px-5 w-[100px]">Search</button>

            </div>
        </div>
    </nav>
    <section class="w-10/12 mx-auto">
        <div class="bg-white mt-10 mb-5 py-4 px-4 rounded-lg flex gap-2 flex-wrap">
            <button class="btn btn-primary w-[100px]">All</button>
            <button class="btn w-[100px]">Open</button>
            <button class="btn w-[100px]">Closed</button>
        </div>

        <div class="flex justify-between px-4 py-4 bg-white rounded-lg">
            <div class="flex items-center gap-1">
                <div><img src="images/2.png" alt=""></div>
                <div>
                    <div>50 Issues</div>
                    <div class="text-neutral-500/50">Track and manage your project issues</div>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <div>Open</div>
                </div>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                    <div>Closed</div>
                </div>
            </div>
        </div>

    </section>

    <script src="project.js"></script>
</body>

</html>
